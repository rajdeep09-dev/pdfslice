<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>F12X v4 · Human Account Qualifier</title>

<!-- CDN Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="offline-banner" id="offlineBanner">⚡ You are offline. Check your connection.</div>

<div class="header">
  <div class="logo">
    <div class="logo-mark">F12X</div>
    <div><div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;">Human Qualifier</div></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="clearSession()">🧹 Reset Session</button>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="openSettings()">⚙️</button>
    <button class="btn btn-ghost btn-icon btn-sm" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-input" onclick="showSection('input', this)">INPUT</button>
  <button class="nav-btn" id="nav-queue" onclick="showSection('queue', this)">QUEUE <span class="badge" id="queueBadge" style="display:none">0</span></button>
  <button class="nav-btn" id="nav-results" onclick="showSection('results', this)">RESULTS <span class="badge green" id="passBadge" style="display:none">0</span></button>
  <button class="nav-btn" id="nav-outreach" onclick="showSection('outreach', this)">OUTREACH</button>
  <button class="nav-btn" id="nav-history" onclick="showSection('history', this)">HISTORY</button>
</nav>

<div class="toast" id="toast"></div>

<!-- Sections -->
<div id="section-input" class="section active"></div>
<div id="section-queue" class="section"></div>
<div id="section-results" class="section"></div>
<div id="section-outreach" class="section"></div>
<div id="section-history" class="section"></div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal" onclick="if(event.target===this)closeSettings()">
<div class="modal">
  <div class="modal-header"><div class="modal-title">⚙️ Settings</div><button class="modal-close" onclick="closeSettings()">✕</button></div>
  <div class="modal-body">
    <div class="input-group"><label class="input-label">rss2json API Key</label><input type="password" class="input" id="set-rss2json" oninput="saveSetting('rss2json',this.value)"></div>
    <div class="input-group"><label class="input-label">NVIDIA Key</label><input type="password" class="input" id="set-nvidia" oninput="saveSetting('nvidia',this.value)"></div>
    <div class="input-group"><label class="input-label">Groq Key</label><input type="password" class="input" id="set-groq" oninput="saveSetting('groq',this.value)"></div>
    <div class="input-group"><label class="input-label">Gemini Key</label><input type="password" class="input" id="set-gemini" oninput="saveSetting('gemini',this.value)"></div>
  </div>
</div>
</div>

<script src="js/main.js"></script>
<script>
  // Simple section loader
  async function loadSections() {
    const sections = ['input', 'queue', 'results', 'outreach', 'history'];
    for(const sec of sections) {
      const res = await fetch('pages/' + sec + '.html');
      document.getElementById('section-' + sec).innerHTML = await res.text();
    }
  }
  loadSections();
</script>
</body>
</html>
